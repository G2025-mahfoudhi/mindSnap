<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — MindSnap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal:        #3d8c7a;
      --teal-dark:   #2e6e5e;
      --teal-light:  #8fc9be;
      --teal-bg:     #e8f4f1;
      --teal-border: #b3d9d1;
      --bg:          #f7f7f5;
      --surface:     #ffffff;
      --border:      rgba(0,0,0,0.10);
      --text:        #1a1a18;
      --muted:       #6b6b67;
      --hint:        #9b9b97;
      --font:        'Inter', system-ui, sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; padding: 0 2rem; height: 56px; background: var(--surface); border-bottom: 0.5px solid var(--border); }
    .nav-brand { display: flex; align-items: center; gap: 8px; font-weight: 500; font-size: 15px; color: var(--text); text-decoration: none; }
    .nav-logo { width: 28px; height: 28px; background: var(--teal); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1.5rem; text-align: center; }
    #rubik-outer { display: flex; flex-direction: column; align-items: center; margin: 0 auto 2rem; }
    #erreur-label { font-size: 26px; font-weight: 500; letter-spacing: 0.20em; text-transform: uppercase; color: var(--teal); margin-bottom: 14px; }
    #rubik-wrap { width: 340px; height: 340px; }
    #rubik-wrap canvas { display: block; }
    h1 { font-size: 28px; font-weight: 500; color: var(--text); margin-bottom: 1rem; line-height: 1.3; opacity: 0; transform: translateY(12px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .subtitle { font-size: 16px; color: var(--muted); max-width: 440px; margin: 0 auto 2.5rem; line-height: 1.7; opacity: 0; transform: translateY(12px); transition: opacity 0.6s ease 0.15s, transform 0.6s ease 0.15s; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; opacity: 0; transform: translateY(12px); transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s; }
    h1.visible, .subtitle.visible, .actions.visible { opacity: 1; transform: translateY(0); }
    .btn-primary { background: var(--teal); color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: var(--font); text-decoration: none; display: inline-block; transition: background 0.15s; }
    .btn-primary:hover { background: var(--teal-dark); }
    .btn-outline { background: transparent; color: var(--text); border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; padding: 10px 24px; font-size: 15px; font-weight: 400; cursor: pointer; font-family: var(--font); text-decoration: none; display: inline-block; transition: background 0.15s; }
    .btn-outline:hover { background: rgba(0,0,0,0.04); }
    .detail-card { margin-top: 3rem; background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; max-width: 480px; text-align: left; opacity: 0; transform: translateY(12px); transition: opacity 0.6s ease 0.45s, transform 0.6s ease 0.45s; }
    .detail-card.visible { opacity: 1; transform: translateY(0); }
    .detail-label { font-size: 11px; color: var(--hint); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
    .detail-text { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .url-line { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .url-label { font-size: 12px; color: var(--hint); white-space: nowrap; }
    .url-val { font-family: ui-monospace, monospace; font-size: 12px; color: var(--hint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">
    <div class="nav-logo" aria-hidden="true">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="3" fill="white" opacity="0.9"/>
        <circle cx="3" cy="4" r="1.5" fill="white" opacity="0.6"/>
        <circle cx="13" cy="4" r="1.5" fill="white" opacity="0.6"/>
        <circle cx="3" cy="12" r="1.5" fill="white" opacity="0.6"/>
        <circle cx="13" cy="12" r="1.5" fill="white" opacity="0.6"/>
        <line x1="8" y1="8" x2="3" y2="4" stroke="white" stroke-width="0.8" opacity="0.5"/>
        <line x1="8" y1="8" x2="13" y2="4" stroke="white" stroke-width="0.8" opacity="0.5"/>
        <line x1="8" y1="8" x2="3" y2="12" stroke="white" stroke-width="0.8" opacity="0.5"/>
        <line x1="8" y1="8" x2="13" y2="12" stroke="white" stroke-width="0.8" opacity="0.5"/>
      </svg>
    </div>
    MindSnap
  </a>
</nav>

<main>
  <div id="rubik-outer">
    <div id="erreur-label">Erreur</div>
    <div id="rubik-wrap"></div>
  </div>

  <h1 id="title">Cette page est introuvable</h1>
  <p class="subtitle" id="sub">Ce document n'existe pas ou a été déplacé.<br>
    Ton deuxième cerveau ne se souvient pas de cette adresse.</p>

  <div class="actions" id="actions">
    <a href="/" class="btn-primary">Retour à l'accueil</a>
    <a href="/search" class="btn-outline">Rechercher</a>
  </div>

  <div class="detail-card" id="card">
    <p class="detail-label">Page demandée</p>
    <p class="detail-text">Not Found — la ressource demandée n'a pas été trouvée sur ce serveur.</p>
    <div class="url-line">
      <span class="url-label">URL</span>
      <span class="url-val" id="req-url">—</span>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {

  var ERROR_CODE = '404';
  var FACE_COLORS = [
    0x3d8c7a,  // +X
    0x2e6e5e,  // -X
    0xf0faf8,  // +Y
    0xb3d9d1,  // -Y
    0x8fc9be,  // +Z
    0xe8f4f1,  // -Z
  ];
  var N = 3, SZ = 0.88, GAP = 0.07, STEP = SZ + GAP;
  var W = 340, H = 340;

  var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);
  document.getElementById('rubik-wrap').appendChild(renderer.domElement);

  var scene  = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(36, W / H, 0.1, 100);
  camera.position.set(5.8, 4.6, 6.8);
  camera.lookAt(0, 0, 0);

  scene.add(new THREE.AmbientLight(0xffffff, 0.75));
  var sun = new THREE.DirectionalLight(0xffffff, 0.55);
  sun.position.set(6, 10, 8);
  scene.add(sun);

  function makeDigitTexture(digit) {
    var cv = document.createElement('canvas');
    cv.width = cv.height = 128;
    var ctx = cv.getContext('2d');
    ctx.clearRect(0, 0, 128, 128);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 82px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(digit, 64, 68);
    return new THREE.CanvasTexture(cv);
  }

  var blankTex = makeDigitTexture('');
  var digitTexes = {};
  for (var i = 0; i <= 9; i++) digitTexes[String(i)] = makeDigitTexture(String(i));

  var half = (N - 1) / 2;

  function makeCubie(cx, cy, cz) {
    var cubie = new THREE.Group();
    cubie.add(new THREE.Mesh(
      new THREE.BoxGeometry(SZ*0.90, SZ*0.90, SZ*0.90),
      new THREE.MeshPhongMaterial({ color: 0x151513, shininess: 20 })
    ));
    var faceHalf = SZ*0.76, faceThk = 0.012, off = SZ*0.45 + faceThk/2;
    var defs = [
      {a:'x',s: 1,ci:0},{a:'x',s:-1,ci:1},
      {a:'y',s: 1,ci:2},{a:'y',s:-1,ci:3},
      {a:'z',s: 1,ci:4},{a:'z',s:-1,ci:5},
    ];
    defs.forEach(function(d) {
      var pos  = d.a==='x' ? cx : d.a==='y' ? cy : cz;
      var edge = (d.s===1 && pos===half) || (d.s===-1 && pos===-half);
      if (!edge) return;
      var gw = d.a==='x' ? faceThk : faceHalf;
      var gh = d.a==='y' ? faceThk : faceHalf;
      var gd = d.a==='z' ? faceThk : faceHalf;
      var isDigitFace = (d.a==='z' && d.s===1);
      var mat;
      if (isDigitFace) {
        mat = new THREE.MeshPhongMaterial({ color: FACE_COLORS[4], map: blankTex, shininess: 60 });
        cubie.userData.digitMat = mat;
      } else {
        mat = new THREE.MeshPhongMaterial({ color: FACE_COLORS[d.ci], shininess: 60 });
      }
      var mesh = new THREE.Mesh(new THREE.BoxGeometry(gw, gh, gd), mat);
      mesh.position[d.a] = d.s * off;
      cubie.add(mesh);
    });
    cubie.position.set(cx*STEP, cy*STEP, cz*STEP);
    cubie.userData.home = new THREE.Vector3(cx*STEP, cy*STEP, cz*STEP);
    return cubie;
  }

  var group = new THREE.Group(), cubies = [], digitCubies = [];
  scene.add(group);

  for (var x=-half; x<=half; x++)
    for (var y=-half; y<=half; y++)
      for (var z=-half; z<=half; z++) {
        var c = makeCubie(x, y, z);
        group.add(c); cubies.push(c);
        if (z===half && y===0) digitCubies.push({cubie:c, col:x});
      }
  digitCubies.sort(function(a,b){return a.col-b.col;});

  var SPREAD = 3.2;
  var scattered = cubies.map(function(c) {
    var h = c.userData.home;
    return {
      x: h.x+(Math.random()-0.5)*SPREAD*2,
      y: h.y+(Math.random()-0.5)*SPREAD*2,
      z: h.z+(Math.random()-0.5)*SPREAD*1.2,
      rx:(Math.random()-0.5)*Math.PI,
      ry:(Math.random()-0.5)*Math.PI,
    };
  });

  cubies.forEach(function(c,i) {
    c.position.set(scattered[i].x, scattered[i].y, scattered[i].z);
    c.rotation.set(scattered[i].rx, scattered[i].ry, 0);
    c.traverse(function(obj) { if(obj.isMesh){obj.material.transparent=true;obj.material.opacity=0;} });
  });

  function easeOutBack(t)  { var c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }
  function easeInOutQuad(t){ return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
  function lerp(a,b,t)     { return a+(b-a)*t; }

  var clock=new THREE.Clock(), phase='appear', phaseT=0, idleT=0;
  var APPEAR_DUR=0.7, BUILD_DUR=2.0, REVEAL_DUR=0.9;
  var buildDelays=cubies.map(function(){return Math.random()*0.8;});

  function onAnimComplete() {
    ['title','sub','actions','card'].forEach(function(id){
      var el=document.getElementById(id); if(el) el.classList.add('visible');
    });
  }

  function animate() {
    requestAnimationFrame(animate);
    var dt=clock.getDelta(); phaseT+=dt;

    if (phase==='appear') {
      var p=Math.min(phaseT/APPEAR_DUR,1);
      cubies.forEach(function(c){c.traverse(function(obj){if(obj.isMesh)obj.material.opacity=p*0.55;});});
      if(p>=1){phase='build';phaseT=0;}

    } else if (phase==='build') {
      cubies.forEach(function(c,i) {
        var local=Math.max(0,phaseT-buildDelays[i]*BUILD_DUR*0.5);
        var p=Math.min(local/(BUILD_DUR*0.55),1);
        var ep=easeOutBack(p), h=c.userData.home;
        c.position.x=lerp(scattered[i].x,h.x,ep);
        c.position.y=lerp(scattered[i].y,h.y,ep);
        c.position.z=lerp(scattered[i].z,h.z,ep);
        c.rotation.x=lerp(scattered[i].rx,0,easeInOutQuad(p));
        c.rotation.y=lerp(scattered[i].ry,0,easeInOutQuad(p));
        c.traverse(function(obj){if(obj.isMesh)obj.material.opacity=lerp(0.55,1,p);});
      });
      group.rotation.y=easeInOutQuad(Math.min(phaseT/BUILD_DUR,1))*0.6;
      if(phaseT>=BUILD_DUR) {
        cubies.forEach(function(c){
          c.position.copy(c.userData.home); c.rotation.set(0,0,0);
          c.traverse(function(obj){if(obj.isMesh)obj.material.opacity=1;});
        });
        phase='reveal'; phaseT=0;
      }

    } else if (phase==='reveal') {
      var digits=ERROR_CODE.split('');
      digits.forEach(function(digit,idx) {
        var triggerAt=(idx/digits.length)*REVEAL_DUR*0.8;
        if(phaseT>=triggerAt && digitCubies[idx]) {
          var mat=digitCubies[idx].cubie.userData.digitMat;
          if(mat && mat.map!==digitTexes[digit]) {
            mat.map=digitTexes[digit]; mat.needsUpdate=true;
            mat.color.setHex(0xffffff);
            var cubieRef=digitCubies[idx].cubie;
            setTimeout(function(){if(cubieRef.userData.digitMat)cubieRef.userData.digitMat.color.setHex(FACE_COLORS[4]);},180);
          }
        }
      });
      if(phaseT>=REVEAL_DUR){phase='idle';phaseT=0;onAnimComplete();}

    } else if (phase==='idle') {
      idleT+=dt;
      group.rotation.y=0.6+idleT*0.35;
      group.rotation.x=Math.sin(idleT*0.22)*0.28;
    }
    renderer.render(scene,camera);
  }

  animate();
  document.getElementById('req-url').textContent=window.location.pathname||'/';

})();
</script>
</body>
</html>
